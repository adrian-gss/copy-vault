<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Bitter:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#2a2a2a;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:100vh;gap:28px;
    font-family:'Space Mono',monospace;padding:40px;
  }

  /* ── POST CARD 540×540 (exports at 1080×1080) ── */
  .post{
    width:540px;height:540px;
    background:#EBEBEA;
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
    flex-shrink:0;
  }

  /* header */
  .post-header{
    background:#0A0A0A;
    padding:14px 22px;
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
  }
  .post-dot{
    width:22px;height:22px;background:#FF4800;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .post-dot svg{width:12px;height:14px}
  .post-title{
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:#F0F0EE;
    border-bottom:1.5px solid #FF4800;padding-bottom:2px;
  }

  /* card wrapper — gives the offset shadow effect */
  .post-card-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:28px 30px 20px;
  }
  .post-card{
    width:100%;height:100%;
    background:#FFFFFF;
    border:2px solid #080808;
    box-shadow:6px 6px 0px #080808;
    display:flex;flex-direction:column;
    padding:28px 30px 22px;
  }

  /* copy text */
  .post-copy{
    flex:1;display:flex;align-items:flex-start;
    font-family:'Bitter',serif;font-weight:400;
    color:#080808;line-height:1.15;letter-spacing:-.01em;
    text-align:left;
  }
  .post-copy.xl{ font-size:56px;line-height:1.02;letter-spacing:-.03em }
  .post-copy.lg{ font-size:42px;line-height:1.08;letter-spacing:-.02em }
  .post-copy.md{ font-size:31px;line-height:1.15 }
  .post-copy.sm{ font-size:22px;line-height:1.25 }
  .post-copy.xs{ font-size:16px;line-height:1.35 }

  /* card footer */
  .post-card-foot{
    border-top:1px solid #D8D8D5;
    padding-top:12px;
    display:flex;align-items:baseline;justify-content:space-between;
    flex-shrink:0;
  }
  .post-card-brand{
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;color:#080808;
  }
  .post-card-year{
    font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.06em;color:#969696;
  }

  /* bottom bar */
  .post-bottom{
    background:#EBEBEA;
    padding:12px 22px 14px;
    display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .post-bottom-left{
    font-family:'Space Mono',monospace;font-size:8px;
    letter-spacing:.12em;text-transform:uppercase;color:#969696;
  }
  .post-bottom-right{
    display:flex;align-items:center;gap:14px;
  }
  .post-bottom-url{
    font-family:'Space Mono',monospace;font-size:8px;
    letter-spacing:.1em;text-transform:uppercase;color:#969696;
  }
  .post-bottom-icons{
    display:flex;align-items:center;gap:8px;
  }
  .post-bottom-icons svg{width:14px;height:14px;fill:#969696}

  /* controls */
  .controls{
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;
  }
  .btn{
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;
    padding:10px 20px;cursor:pointer;border:1.5px solid #FF4800;
    background:transparent;color:#FF4800;transition:.1s;
  }
  .btn:hover{background:#FF4800;color:#000}
  .btn.primary{background:#FF4800;color:#000}
  select{
    font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.08em;padding:10px 14px;
    border:1.5px solid #555;background:#1a1a1a;color:#F0F0EE;cursor:pointer;
  }
  .lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#555}
</style>
</head>
<body>

<div class="post" id="post">

  <!-- HEADER -->
  <div class="post-header">
    <div class="post-dot">
      <svg viewBox="0 0 13 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1h7.5L12 4.5V14H1V1Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8.5 1v3.5H12" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <text x="6.5" y="12" text-anchor="middle" font-size="6.5" font-weight="700" fill="currentColor" font-family="monospace">?</text>
      </svg>
    </div>
    <span class="post-title">The Copy Vault</span>
  </div>

  <!-- CARD -->
  <div class="post-card-wrap">
    <div class="post-card">
      <div class="post-copy lg" id="post-copy">Think different.</div>
      <div class="post-card-foot">
        <span class="post-card-brand" id="post-brand">Apple</span>
        <span class="post-card-year" id="post-year">1997</span>
      </div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="post-bottom">
    <span class="post-bottom-left">Find this and more at:</span>
    <div class="post-bottom-right">
      <span class="post-bottom-url">the-copy-vault.com</span>
      <div class="post-bottom-icons">
        <!-- Instagram -->
        <svg viewBox="0 0 29.56 29.56" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.78,0C10.77,0,10.26.02,8.69.09c-1.57.07-2.65.32-3.59.69-.97.38-1.8.88-2.62,1.7-.82.82-1.33,1.65-1.71,2.62-.37.94-.62,2.01-.69,3.59-.07,1.58-.09,2.08-.09,6.1s.02,4.52.09,6.09c.07,1.57.32,2.65.69,3.59.38.97.88,1.8,1.7,2.62.82.82,1.65,1.33,2.62,1.71.94.37,2.01.61,3.59.69,1.58.07,2.08.09,6.09.09s4.52-.02,6.09-.09c1.57-.07,2.65-.32,3.59-.69.97-.38,1.8-.88,2.62-1.71.82-.82,1.33-1.65,1.71-2.62.36-.94.61-2.01.69-3.59.07-1.58.09-2.08.09-6.09s-.02-4.52-.09-6.09c-.07-1.57-.32-2.65-.69-3.59-.38-.97-.88-1.8-1.71-2.62-.82-.82-1.64-1.33-2.62-1.7-.94-.37-2.02-.61-3.59-.69-1.58-.07-2.08-.09-6.09-.09h0ZM13.46,2.66c.39,0,.83,0,1.33,0,3.95,0,4.41.01,5.97.08,1.44.07,2.22.31,2.74.51.69.27,1.18.59,1.7,1.11.52.52.84,1.01,1.11,1.7.2.52.44,1.3.51,2.74.07,1.56.09,2.03.09,5.97s-.02,4.41-.09,5.97c-.07,1.44-.31,2.22-.51,2.74-.27.69-.59,1.18-1.11,1.7-.52.52-1.01.84-1.7,1.11-.52.2-1.3.44-2.74.51-1.56.07-2.03.09-5.97.09s-4.41-.02-5.97-.09c-1.44-.07-2.22-.31-2.74-.51-.69-.27-1.18-.59-1.7-1.11-.52-.52-.84-1.01-1.11-1.7-.2-.52-.44-1.3-.51-2.74-.07-1.56-.08-2.03-.08-5.97s.01-4.41.08-5.97c.07-1.44.31-2.22.51-2.74.27-.69.59-1.18,1.11-1.7.52-.52,1.01-.84,1.7-1.11.52-.2,1.3-.44,2.74-.51,1.36-.06,1.89-.08,4.65-.08h0ZM22.67,5.12c-.98,0-1.77.79-1.77,1.77s.79,1.77,1.77,1.77,1.77-.79,1.77-1.77-.79-1.77-1.77-1.77h0ZM14.78,7.19c-4.19,0-7.59,3.4-7.59,7.59s3.4,7.59,7.59,7.59c4.19,0,7.59-3.4,7.59-7.59s-3.4-7.59-7.59-7.59h0ZM14.78,9.85c2.72,0,4.93,2.21,4.93,4.93s-2.21,4.93-4.93,4.93-4.93-2.21-4.93-4.93,2.21-4.93,4.93-4.93Z"/>
        </svg>
        <!-- LinkedIn -->
        <svg viewBox="0 0 29.36 29.36" xmlns="http://www.w3.org/2000/svg">
          <path d="M26.09,0H3.26C1.46,0,0,1.46,0,3.26v22.83c0,1.8,1.46,3.26,3.26,3.26h22.83c1.8,0,3.26-1.46,3.26-3.26V3.26c0-1.8-1.46-3.26-3.26-3.26ZM8.88,25.28h-4.38v-14.13h4.38v14.13ZM6.67,9.29c-1.43,0-2.59-1.17-2.59-2.61s1.16-2.61,2.59-2.61,2.59,1.17,2.59,2.61-1.16,2.61-2.59,2.61ZM25.28,25.28h-4.36v-7.42c0-2.03-.77-3.17-2.38-3.17-1.75,0-2.67,1.18-2.67,3.17v7.42h-4.2v-14.13h4.2v1.9s1.26-2.34,4.26-2.34,5.14,1.83,5.14,5.62v8.95Z"/>
        </svg>
      </div>
    </div>
  </div>

</div>

<!-- CONTROLS (not exported) -->
<div class="controls">
  <span class="lbl">Preview:</span>
  <select id="picker" onchange="loadSample(this.value)">
    <option value="0">Think different. — Apple</option>
    <option value="1">Just do it. — Nike</option>
    <option value="2">FCK. — KFC</option>
    <option value="3">A diamond is forever. — De Beers</option>
    <option value="4">Smart may have the plans, but stupid has the stories. — Diesel</option>
    <option value="5">You never actually own a Patek Philippe. You merely look after it for the next generation. — Patek</option>
    <option value="6">There is no finish line. — Nike</option>
  </select>
  <button class="btn primary" onclick="exportPost()">↓ Download PNG</button>
</div>

<script>
const SAMPLES=[
  {copy:"Think different.",brand:"Apple",year:1997},
  {copy:"Just do it.",brand:"Nike",year:1988},
  {copy:"FCK.",brand:"KFC",year:2018},
  {copy:"A diamond is forever.",brand:"De Beers",year:1947},
  {copy:"Smart may have the plans, but stupid has the stories.",brand:"Diesel",year:2010},
  {copy:"You never actually own a Patek Philippe. You merely look after it for the next generation.",brand:"Patek Philippe",year:1996},
  {copy:"There is no finish line.",brand:"Nike",year:1977},
];

function sizeClass(n){
  if(n<=12) return 'xl';
  if(n<=35) return 'lg';
  if(n<=80) return 'md';
  if(n<=140) return 'sm';
  return 'xs';
}

function loadSample(i){
  const d=SAMPLES[i];
  const el=document.getElementById('post-copy');
  el.textContent=d.copy;
  el.className='post-copy '+sizeClass(d.copy.length);
  document.getElementById('post-brand').textContent=d.brand.toUpperCase();
  document.getElementById('post-year').textContent=d.year||'';
}

// Called from main index.html sheet button
function loadFromSheet(copy, brand, year){
  const el=document.getElementById('post-copy');
  el.textContent=copy;
  el.className='post-copy '+sizeClass(copy.length);
  document.getElementById('post-brand').textContent=(brand||'').toUpperCase();
  document.getElementById('post-year').textContent=year||'';
}

function exportPost(){
  html2canvas(document.getElementById('post'),{
    scale:2,useCORS:true,
    width:540,height:540,
    backgroundColor:null,
  }).then(canvas=>{
    const a=document.createElement('a');
    const brand=document.getElementById('post-brand').textContent.toLowerCase().replace(/\s+/g,'-');
    a.download='copyvault-'+brand+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
}

loadSample(0);
</script>
</body>
</html>
