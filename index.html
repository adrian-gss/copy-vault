<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Copy Vault</title>
<link rel="icon" type="image/svg+xml" href="./logo.svg">
<link rel="shortcut icon" href="./logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Bitter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EBEBEA;
    --card:#FFFFFF;
    --ink:#080808;
    --ink-soft:#505050;
    --line:#080808;
    --line-soft:#CECECE;
    --accent:#FF4800;
    --accent-ink:#FFFFFF;
    --accent-deep:#C23600;
    --meta:#909090;
    --header-bg:#0A0A0A;
    --header-line:#0A0A0A;
    --on-dark:#F0F0EE;
    --on-dark-soft:#888888;
    --sans:'Space Grotesk','Helvetica Neue',sans-serif;
    --mono:'Space Mono','IBM Plex Mono',monospace;
    --serif:'Bitter','Georgia',serif;
    --shadow:none;
    --shadow-hi:3px 3px 0px #080808;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding:0 0 88px}

  header{
    position:sticky;top:0;z-index:40;background:var(--header-bg);
    border-bottom:2px solid var(--header-line);
    padding:20px 40px 0;
  }
  .masthead{display:flex;align-items:center;justify-content:space-between;gap:18px;padding-bottom:20px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .dot{
    width:26px;height:26px;flex:none;border:2px solid var(--ink);border-radius:0;
    display:flex;align-items:center;justify-content:center;font-size:10px;
    background:var(--accent);font-family:var(--mono);font-weight:700;color:var(--ink);
  }
  .brand .tag{
    background:transparent;color:var(--on-dark);font-family:var(--mono);
    font-size:17px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:0 0 3px 0;margin-left:0;white-space:nowrap;
    border-bottom:2px solid var(--accent);
  }
  .brand .tag-sep{color:var(--accent);margin-right:2px;}
  .count{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dark-soft);font-variant-numeric:tabular-nums;white-space:nowrap}

  .searchrow{display:flex;align-items:center;gap:0;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);border-radius:0;margin-bottom:16px;transition:box-shadow .1s}
  .searchrow:focus-within{box-shadow:3px 3px 0 var(--accent);border-color:var(--accent)}
  .searchrow .sicon{color:var(--on-dark-soft);margin-left:16px;flex:none}
  .searchrow input{
    flex:1;border:0;background:transparent;color:var(--on-dark);
    font-family:var(--sans);font-size:17px;font-weight:500;letter-spacing:-.01em;padding:14px 16px;outline:none;
  }
  .searchrow input::placeholder{color:var(--on-dark-soft)}
  .searchrow .clr{border:0;background:transparent;color:var(--on-dark-soft);cursor:pointer;font-size:20px;padding:0 16px;line-height:1}
  .searchrow .clr:hover{color:var(--on-dark)}

  .lexrow{display:flex;flex-wrap:wrap;gap:7px;padding-bottom:16px;min-height:0;align-items:center}
  .lexrow.empty{padding-bottom:0}
  .lexlabel{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dark-soft);align-self:center;margin-right:6px}
  .lex{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--on-dark);
    padding:4px 10px;border-radius:0;cursor:pointer;transition:.1s;
  }
  .lex:hover{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}

  .filterbar{display:flex;flex-wrap:wrap;gap:14px 28px;padding:0 0 18px}
  .fgroup{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .ftitle{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dark-soft);margin-right:4px}
  .f{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--on-dark-soft);
    padding:5px 12px;cursor:pointer;border-radius:0;transition:.1s;white-space:nowrap;
  }
  .f:hover{border-color:var(--on-dark);color:var(--on-dark)}
  .f.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}


  .filtertoggle{display:none}

  main{padding:30px 40px 0}
  .grid{column-count:3;column-gap:18px}
  @media(max-width:1000px){.grid{column-count:2}}
  @media(max-width:640px){
    .grid{column-count:1}
    header,main,.activerow{padding-left:22px;padding-right:22px}
    header{padding-top:16px}
    .masthead{padding-bottom:14px}
    .searchrow{margin-bottom:12px}
    .searchrow input{font-size:17px;padding:13px 14px}
    /* filtros como desplegable */
    .filtertoggle{
      display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
      background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--on-dark);
      font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
      padding:12px 16px;border-radius:10px;cursor:pointer;margin-bottom:16px;
    }
    .filtertoggle .lbl{display:flex;align-items:center;gap:8px}
    .filtertoggle .fcount{background:var(--accent);color:var(--accent-ink);font-size:11px;font-weight:700;border-radius:40px;padding:1px 8px;font-variant-numeric:tabular-nums}
    .filtertoggle .fcount:empty{display:none}
    .filtertoggle .chev{transition:transform .2s;flex:none}
    header.filters-open .filtertoggle{margin-bottom:14px}
    header.filters-open .filtertoggle .chev{transform:rotate(180deg)}
    .filterbar{display:none;flex-direction:column;gap:14px;padding-bottom:18px}
    header.filters-open .filterbar{display:flex}
    .fgroup{width:100%}
  }

  .card{
    break-inside:avoid;margin-bottom:14px;background:var(--card);
    border:1.5px solid var(--ink);border-radius:0;padding:22px 22px 16px;cursor:pointer;
    transition:box-shadow .1s;box-shadow:none;position:relative;
  }
  .card:hover{box-shadow:3px 3px 0 var(--ink)}
  .card .q{font-family:var(--serif);line-height:1.18;color:var(--ink);margin-bottom:20px;font-weight:400;letter-spacing:-.01em;text-wrap:pretty}
  .card .q.xs{font-size:20px}
  .card .q.sm{font-size:25px}
  .card .q.md{font-size:30px;line-height:1.1}
  .card .q.lg{font-size:40px;line-height:1.03;letter-spacing:-.025em}
  .foot{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line-soft);padding-top:11px}
  .foot .b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase}
  .foot .y{font-family:var(--mono);font-size:10px;color:var(--meta);font-variant-numeric:tabular-nums}
  mark{background:var(--accent);color:var(--ink);padding:0 2px;border-radius:0}
  .word{cursor:pointer;border-radius:1px;transition:background .08s}
  .word:hover{background:rgba(255,72,0,.15)}

  .empty-state{column-span:all;text-align:center;padding:90px 0;color:var(--meta);font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(8,8,8,.5);z-index:80;display:none;backdrop-filter:blur(2px)}
  .scrim.show{display:block}
  .sheet{
    position:fixed;top:0;right:0;height:100%;width:450px;max-width:92vw;z-index:90;
    background:var(--card);border-left:2px solid var(--ink);
    transform:translateX(100%);transition:transform .24s cubic-bezier(.2,.7,.2,1);
    display:flex;flex-direction:column;
  }
  .sheet.show{transform:translateX(0)}
  .sheet .x{align-self:flex-end;border:0;background:transparent;color:var(--meta);font-size:22px;cursor:pointer;padding:18px 24px;line-height:1;font-family:var(--mono)}
  .sheet .x:hover{color:var(--ink)}
  .sheet .body{padding:0 36px 48px;overflow:auto}
  .sheet .bigq{font-family:var(--serif);font-size:32px;line-height:1.12;font-weight:400;letter-spacing:-.01em;margin:6px 0 30px;color:var(--ink);text-wrap:pretty}
  .sheet dl{display:grid;grid-template-columns:auto 1fr;gap:0}
  .sheet dt{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--meta);padding:12px 0;border-top:1px solid var(--line-soft);align-self:center}
  .sheet dd{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink);padding:12px 0 12px 20px;border-top:1px solid var(--line-soft);text-align:right}
  .sheet dd.note{color:var(--ink-soft);font-size:12px;line-height:1.5;font-weight:400}
  .sheet .dl-btn{
    display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    background:var(--accent);color:var(--accent-ink);border:0;
    padding:12px 20px;cursor:pointer;margin-top:28px;width:100%;justify-content:center;
    transition:opacity .1s;
  }
  .sheet .dl-btn:hover{opacity:.85}

</style>
</head>
<body>
<header>
  <div class="masthead">
    <div class="brand" style="opacity: 1">
      <span class="dot"><svg width="13" height="15" viewBox="0 0 13 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h7.5L12 4.5V14H1V1Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8.5 1v3.5H12" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><text x="6.5" y="12" text-anchor="middle" font-size="6.5" font-weight="700" fill="currentColor" font-family="monospace">?</text></svg></span>
      <span class="tag">THE COPY VAULT</span>
    </div>
    <div class="count" id="count"></div>
  </div>
  <div class="searchrow">
    <svg class="sicon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"></circle><line x1="15.8" y1="15.8" x2="21" y2="21"></line></svg>
    <input id="q" type="text" placeholder="Search by word, brand or sector…" autocomplete="off" spellcheck="false">
    <button class="clr" id="qclr" title="borrar búsqueda" style="display:none">×</button>
  </div>
  <div class="lexrow empty" id="lex"></div>
  <button class="filtertoggle" id="filtertoggle" aria-expanded="false">
    <span class="lbl">Filters <span class="fcount" id="fcount"></span></span>
    <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </button>
  <div class="filterbar" id="filterbar"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="sheet" id="sheet" aria-hidden="true">
  <button class="x" id="sheetx">×</button>
  <div class="body" id="sheetbody"></div>
</aside>

<script>

estival_or_note":"Cannes Outdoor Grand Prix","lang":"en"},{"copy":"Smart may have the brains, but stupid has the balls.","brand":"Diesel","sector":"fashion & style","copy_type":"headline","year":2010,"campaign":"Be Stupid","agency":"Anomaly","medium":"OOH","festival_or_note":"Cannes Outdoor Grand Prix","lang":"en"},{"copy":"Smart critiques. Stupid creates.","brand":"Diesel","sector":"fashion & style","copy_type":"headline","year":2010,"campaign":"Be Stupid","agency":"Anomaly","medium":"OOH","festival_or_note":"Cannes Outdoor Grand Prix","lang":"en"},{"copy":"Don't buy this jacket.","brand":"Patagonia","sector":"fashion & style","copy_type":"headline","year":2011,"campaign":"Don't Buy This Jacket","agency":"In-house","medium":"print (NYT Black Friday)","festival_or_note":"Cannes Lions + AdAge most controversial ads canon","lang":"en"},{"copy":"We're in business to save our home planet.","brand":"Patagonia","sector":"fashion & style","copy_type":"brand tagline","year":2018,"campaign":"Mission Statement","agency":"In-house","medium":"brand statement","festival_or_note":"officially-rewritten mission statement","lang":"en"},{"copy":"FCK.","brand":"KFC","sector":"food & drink","copy_type":"headline","year":2018,"campaign":"FCK","agency":"Mother London","medium":"press ad (UK)","festival_or_note":"Cannes Print Grand Prix — chicken-shortage apology","lang":"en"},{"copy":"Wow no cow.","brand":"Oatly","sector":"food & drink","copy_type":"brand tagline","year":2019,"campaign":"Wow No Cow","agency":"Oatly Department of Mind Control","medium":"OOH/packaging","festival_or_note":"D&AD Wood Pencil","lang":"en"},{"copy":"It's like milk but made for humans.","brand":"Oatly","sector":"food & drink","copy_type":"headline","year":2014,"campaign":"Like Milk But For Humans","agency":"In-house","medium":"packaging/OOH","festival_or_note":"subject of a Swedish dairy industry lawsuit","lang":"en"},{"copy":"You shouldn't be reading this. You should be watching the game.","brand":"ESPN","sector":"media & entertainment","copy_type":"headline","year":2003,"campaign":"Without Sports","agency":"Wieden+Kennedy","medium":"print","festival_or_note":"One Show + Communication Arts","lang":"en"},{"copy":"Don't bother to read this. The picture's missing.","brand":"ibidphoto.com","sector":"technology","copy_type":"headline","year":1999,"campaign":"ibid photo library","agency":"Ogilvy (Neil French)","medium":"print","festival_or_note":"D&AD Pencil — long-copy classic","lang":"en"},{"copy":"I never read The Economist. — Management trainee. Aged 42.","brand":"The Economist","sector":"media & entertainment","copy_type":"headline","year":1988,"campaign":"White out of Red","agency":"AMV BBDO (David Abbott)","medium":"OOH","festival_or_note":"doubled subscriber base; D&AD Pencil; Hall of Fame","lang":"en"},{"copy":"Great minds like a think.","brand":"The Economist","sector":"media & entertainment","copy_type":"headline","year":1990,"campaign":"White out of Red","agency":"AMV BBDO","medium":"OOH","festival_or_note":"White-out-of-Red series — D&AD","lang":"en"},{"copy":"Lose the ability to slip out of meetings unnoticed.","brand":"The Economist","sector":"media & entertainment","copy_type":"headline","year":1995,"campaign":"White out of Red","agency":"AMV BBDO","medium":"OOH","festival_or_note":"White-out-of-Red series","lang":"en"},{"copy":"It's lonely at the top, but at least there's something to read.","brand":"The Economist","sector":"media & entertainment","copy_type":"headline","year":1993,"campaign":"White out of Red","agency":"AMV BBDO","medium":"OOH","festival_or_note":"White-out-of-Red series","lang":"en"},{"copy":"I used to think. Now I just read The Economist.","brand":"The Economist","sector":"media & entertainment","copy_type":"headline","year":1990,"campaign":"White out of Red","agency":"AMV BBDO","medium":"OOH","festival_or_note":"White-out-of-Red series — D&AD Pencil","lang":"en"},{"copy":"Think different.","brand":"Apple","sector":"technology","copy_type":" let state={q:'',sectors:new Set(),types:new Set(),langs:new Set(),};

const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const tokens=s=>norm(s).replace(/[^a-z0-9'áéíóúñü ]/gi,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w));

function matches(d){
  if(state.sectors.size && !state.sectors.has(d.sector))return false;
  if(state.types.size && !state.types.has(d.copy_type))return false;
  if(state.langs.size && !state.langs.has(d.lang))return false;
  if(state.q){
    const nq=norm(state.q);
    const inCopy=norm(d.copy).includes(nq);
    const inBrand=norm(d.brand||'').includes(nq);
    const inSector=norm(d.sector||'').includes(nq);
    if(!inCopy&&!inBrand&&!inSector)return false;
  }
  return true;
}

function sizeClass(t){const n=t.length;if(n<=14)return'lg';if(n<=40)return'md';if(n<=95)return'sm';return'xs';}

function wrapWords(text,q){
  const nq=q?norm(q):'';
  return text.split(/([\w'À-öø-ÿ]+)/g).map(part=>{
    if(!part)return '';
    if(!/\w/.test(part))return escapeHtml(part);
    const escaped=escapeHtml(part);
    const dataW=escapeHtml(part);
    const isMatch=nq&&norm(part).includes(nq);
    const span=`<span class="word" data-w="${dataW}">${escaped}</span>`;
    return isMatch?`<mark>${span}</mark>`:span;
  }).join('');
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderFilters(){
  const fb=document.getElementById('filterbar');
  const g=(title,vals,setName,labels)=>{
    const set=state[setName];
    return `<div class="fgroup"><span class="ftitle">${title}</span>`+
      vals.map(v=>`<button class="f ${set.has(v)?'on':''}" data-set="${setName}" data-v="${escapeHtml(v)}">${escapeHtml(labels?labels[v]||v:v)}</button>`).join('')+
      `</div>`;
  };
  fb.innerHTML =
    g('Sector',SECTORS,'sectors') +
    g('Type',TYPES,'types') +
    g('Language',LANGS,'langs',LANG_LABEL);
  fb.querySelectorAll('.f').forEach(b=>b.onclick=()=>{
    const s=state[b.dataset.set];const v=b.dataset.v;
    s.has(v)?s.delete(v):s.add(v);render();
  });
}


function renderLex(results){
  const lex=document.getElementById('lex');
  if(!state.q){lex.className='lexrow empty';lex.innerHTML='';return;}
  const qn=norm(state.q);
  const freq=new Map();
  results.forEach(d=>{
    const seen=new Set();
    tokens(d.copy).forEach(w=>{
      if(w.includes(qn)||qn.includes(w))return;
      if(seen.has(w))return;seen.add(w);
      freq.set(w,(freq.get(w)||0)+1);
    });
  });
  const words=[...freq.entries()].filter(([,n])=>n>=1).sort((a,b)=>b[1]-a[1]).slice(0,14).map(e=>e[0]);
  if(!words.length){lex.className='lexrow empty';lex.innerHTML='';return;}
  lex.className='lexrow';
  lex.innerHTML='<span class="lexlabel">also in</span>'+
    words.map(w=>`<button class="lex" data-w="${escapeHtml(w)}">${escapeHtml(w)}</button>`).join('');
  lex.querySelectorAll('.lex').forEach(b=>b.onclick=()=>{
    state.q=b.dataset.w;document.getElementById('q').value=b.dataset.w;render();
  });
}

function renderGrid(results){
  const grid=document.getElementById('grid');
  if(!results.length){grid.innerHTML='<div class="empty-state">Nothing found for that combination.</div>';return;}
  grid.innerHTML=results.map((d,i)=>{
    const idx=CORPUS.indexOf(d);
    return `<article class="card" data-i="${idx}">
      <div class="q ${sizeClass(d.copy)}">${wrapWords(d.copy,state.q)}</div>
      <div class="foot"><span class="b">${escapeHtml(d.brand)}</span>${d.year!=null&&String(d.year).trim()!==''?`<span class="y">${d.year}</span>`:''}</div>
    </article>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c=>c.onclick=(e)=>{
    const w=e.target.closest('.word');
    if(w){
      const word=w.dataset.w;
      const isActive=norm(state.q)===norm(word);
      state.q=isActive?'':word;
      document.getElementById('q').value=state.q;
      document.getElementById('qclr').style.display=state.q?'block':'none';
      render();
      return;
    }
    openSheet(CORPUS[+c.dataset.i]);
  });
}

let _sheetData=null;
function openSheet(d){
  _sheetData=d;
  const body=document.getElementById('sheetbody');
  const rows=[
    ['brand',d.brand],['campaign',d.campaign],['agency',d.agency],
    ['sector',d.sector],['type',d.copy_type],['medium',d.medium],
    ['year',d.year],['language',LANG_LABEL[d.lang]||d.lang],
  ];
  body.innerHTML='<div class="bigq">'+escapeHtml(d.copy)+'</div><dl>'+
    rows.filter(([,v])=>v!=null && String(v).trim()!=='').map(([k,v])=>`<dt>${k}</dt><dd>${escapeHtml(String(v))}</dd>`).join('')+
    (d.festival_or_note?`<dt>note</dt><dd class="note">${escapeHtml(d.festival_or_note)}</dd>`:'')+
    '</dl>'+
    '<button class="dl-btn" onclick="downloadPost()">↓ Download post</button>';
  document.getElementById('scrim').classList.add('show');
  const s=document.getElementById('sheet');s.classList.add('show');s.setAttribute('aria-hidden','false');
}

function closeSheet(){
  document.getElementById('scrim').classList.remove('show');
  const s=document.getElementById('sheet');s.classList.remove('show');s.setAttribute('aria-hidden','true');
}

function render(){
  const results=CORPUS.filter(matches);
  document.getElementById('count').textContent=results.length+' / '+CORPUS.length+' pieces';
  document.getElementById('qclr').style.display=state.q?'block':'none';
  const nf=state.sectors.size+state.types.size+state.langs.size;
  document.getElementById('fcount').textContent=nf?nf:'';
  renderFilters();renderLex(results);renderGrid(results);
}

document.getElementById('filtertoggle').onclick=function(){
  const h=document.querySelector('header');
  const open=h.classList.toggle('filters-open');
  this.setAttribute('aria-expanded',open?'true':'false');
};

document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();render();});
document.getElementById('qclr').onclick=()=>{state.q='';document.getElementById('q').value='';render();};
document.getElementById('scrim').onclick=closeSheet;
document.getElementById('sheetx').onclick=closeSheet;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});

render();
