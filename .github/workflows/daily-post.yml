name: Daily Post

on:
  schedule:
    # 07:25 UTC. GitHub cron is UTC and best-effort (can be delayed), so we use an
    # off-peak minute (:25) instead of the congested top of the hour to reduce the
    # chance of a dropped run. 07:25 UTC = 09:25 Madrid in summer (CEST) / 08:25 in
    # winter (CET). No gate, so a delayed run still posts instead of being skipped.
    - cron: '25 7 * * *'
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: cd automation && npm install

      - name: Install Playwright Chromium
        run: cd automation && npx playwright install --with-deps chromium

      - name: Generate image and caption
        run: cd automation && node generate.js

      - name: Commit output
        run: |
          git config user.name "copy-vault-bot"
          git config user.email "bot@the-copy-vault.com"
          git add automation/output/post.jpg automation/state.json
          git commit -m "chore: daily post [skip ci]"
          git push
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Publish to Instagram and LinkedIn
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: cd automation && node post.js ${{ env.COMMIT_SHA }}
