name: Daily Post

on:
  schedule:
    # GitHub cron is always UTC and ignores DST. To always hit 09:00 Madrid,
    # we fire at both 07:00 and 08:00 UTC and let the gate job keep only the
    # run that lands on 09:00 local time (07:00 UTC in summer, 08:00 in winter).
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:        # manual trigger for testing (always proceeds)

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ='Europe/Madrid' date +%H)" = "09" ]; then
            echo "It is 09:00 in Madrid — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 09:00 in Madrid (currently $(TZ='Europe/Madrid' date +%H):00) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  post:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: cd automation && npm install

      - name: Install Playwright Chromium
        run: cd automation && npx playwright install --with-deps chromium

      - name: Generate image and caption
        run: cd automation && node generate.js

      - name: Commit output
        run: |
          git config user.name "copy-vault-bot"
          git config user.email "bot@the-copy-vault.com"
          git add automation/output/post.jpg automation/state.json
          git commit -m "chore: daily post [skip ci]"
          git push
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Publish to Instagram and LinkedIn
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: cd automation && node post.js ${{ env.COMMIT_SHA }}
