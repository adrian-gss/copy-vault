name: Daily Post

on:
  # Triggered daily by a Vercel Cron job that calls the GitHub API:
  # POST /actions/workflows/daily-post.yml/dispatches at 07:30 UTC (~09:30 Madrid).
  # GitHub's own `schedule:` cron is intentionally NOT used here — it never fired
  # reliably for this repo. workflow_dispatch also allows manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: cd automation && npm install

      - name: Install Playwright Chromium
        run: cd automation && npx playwright install --with-deps chromium

      - name: Generate image and caption
        run: cd automation && node generate.js

      - name: Commit output
        run: |
          git config user.name "copy-vault-bot"
          git config user.email "bot@the-copy-vault.com"
          git add automation/output/post.jpg automation/state.json
          git commit -m "chore: daily post [skip ci]"
          git push
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Publish to Instagram (via Make)
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: cd automation && node post.js ${{ env.COMMIT_SHA }}

      - name: Publish to LinkedIn (via LinkedIn API)
        # Runs even if the Instagram step failed, so one channel breaking
        # doesn't take down the other.
        if: always()
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
        run: cd automation && node post-linkedin.js
