name: Daily Post

on:
  schedule:
    # 09:40 UTC, off-peak minute. GitHub cron is UTC and best-effort (can be delayed
    # 5-30 min), so we avoid the congested top of the hour. 09:40 UTC = 11:40 Madrid
    # in summer (CEST) / 10:40 in winter (CET) — comfortably mid-morning year-round.
    # No gate, so a delayed run still posts instead of being skipped.
    - cron: '40 9 * * *'
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: cd automation && npm install

      - name: Install Playwright Chromium
        run: cd automation && npx playwright install --with-deps chromium

      - name: Generate image and caption
        run: cd automation && node generate.js

      - name: Commit output
        run: |
          git config user.name "copy-vault-bot"
          git config user.email "bot@the-copy-vault.com"
          git add automation/output/post.jpg automation/state.json
          git commit -m "chore: daily post [skip ci]"
          git push
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Publish to Instagram and LinkedIn
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: cd automation && node post.js ${{ env.COMMIT_SHA }}
